# Local-dev static file server. The Rust API is reached directly by the
# browser at the address configured in `app.js` (CORS allow-listed in the
# backend). In production the static and API services live behind the same
# K8s ingress / cluster gateway, which handles routing — none of that is
# this nginx's concern.

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    server {
        listen 80 default_server;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Don't cache HTML during dev so edits show up on reload.
        location = / {
            try_files /index.html =404;
            add_header Cache-Control "no-cache" always;
        }

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
