raw:
  resources:
    - apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      metadata:
        name: cluster-gateway
        namespace: agentgateway
      spec:
        gatewayClassName: agentgateway
        listeners:
          - protocol: HTTP
            port: 80
            name: http
            hostname: "*.dingle.bop"
            allowedRoutes:
              namespaces:
                from: All
          - protocol: HTTPS
            port: 443
            name: https
            hostname: "*.dingle.bop"
            allowedRoutes:
              namespaces:
                from: All
