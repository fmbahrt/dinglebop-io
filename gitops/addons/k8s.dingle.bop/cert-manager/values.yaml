cert-manager:
  crds:
    enabled: true
  config:
    enableGatewayAPI: true

  # Required for cert-manager to drive ACME challenges through Gateway API
  # HTTPRoutes (instead of legacy Ingress).
  extraArgs:
    - --feature-gates=ExperimentalGatewayAPISupport=true
raw:
  resources:
    - apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt
      spec:
        acme:
          server: https://acme-v02.api.letsencrypt.org/directory
          email: tls@dinglebop.io
          privateKeySecretRef:
            name: letsencrypt-key
          solvers:
            - http01:
                gatewayHTTPRoute:
                  parentRefs:
                    - group: gateway.networking.k8s.io
                      kind: Gateway
                      name: cluster-gateway
                      namespace: agentgateway
                      sectionName: http-public
