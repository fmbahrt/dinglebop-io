apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: dinglebop
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dinglebop-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dinglebop-backend
  namespace: dinglebop
  labels:
    app.kubernetes.io/name: dinglebop-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: dinglebop-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dinglebop-backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dinglebop
          image: ghcr.io/fmbahrt/dinglebop-backend:sha-536eba6a93d6
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: BIND_ADDR
              value: 0.0.0.0:8080
            - name: REDIS_URL
              value: redis://redis.dinglebop.svc.cluster.local:6379
            - name: LOG_FORMAT
              value: json
            - name: RUST_LOG
              value: info,dinglebop=info
            - name: INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            httpGet:
              path: /api/v1/livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
