apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: addons
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/fmbahrt/dinglebop-io.git
        revision: HEAD
        directories:
          - path: gitops/addons/*/*
  template:
    metadata:
      name: "{{index .path.segments 2}}-{{index .path.segments 3}}"
    spec:
      project: default

      source:
        repoURL: https://github.com/fmbahrt/dinglebop-io.git
        targetRevision: HEAD
        path: "{{path}}"

        helm:
          releaseName: "{{index .path.segments 3}}"
          valueFiles:
            - values.yaml

      destination:
        name: "{{index .path.segments 2}}"
        namespace: "{{index .path.segments 3}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
